<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Klevby — рыбалка в Беларуси</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #06130f;
  color: white;
}

.wrap {
  width: 95%;
  max-width: 1200px;
  margin: auto;
}

header {
  padding: 20px 0;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.hero {
  margin-top: 20px;
}

h1 {
  font-size: 36px;
}

button {
  padding: 14px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.green {
  background: #2ecc71;
  color: black;
}

.card {
  background: #0b1f18;
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
  transition: transform 0.2s;
}

#threeFishingScene {
  width: 100%;
  height: 220px;
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0;
}
</style>
</head>

<body>

<div class="wrap">

<header>
<div class="logo">🎣 Klevby</div>
</header>

<div class="hero">
<h1>Найди компанию на рыбалку</h1>

<div id="threeFishingScene"></div>

<button class="green">Смотреть объявления</button>
</div>

<div id="list"></div>

</div>

<script>
// ⚠️ ВСТАВЬ СВОИ ДАННЫЕ
const supabaseUrl = "https://ТВОЙ_URL.supabase.co";
const supabaseKey = "ТВОЙ_ANON_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function load() {
  const { data } = await supabase.from("ads").select("*");

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${item.name || "Без имени"} — ${item.city || ""}</h3>
      <p>${item.text}</p>
    `;
    list.appendChild(div);
  });
}

load();
</script>

<script>
// THREE JS
const box = document.getElementById("threeFishingScene");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  45,
  box.clientWidth / box.clientHeight,
  0.1,
  1000
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(box.clientWidth, box.clientHeight);
box.appendChild(renderer.domElement);

// свет
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(3,5,5);
scene.add(light);

// поплавок
const group = new THREE.Group();

const red = new THREE.Mesh(
  new THREE.CylinderGeometry(0.2,0.2,1),
  new THREE.MeshStandardMaterial({color:0xff3b30})
);

const white = new THREE.Mesh(
  new THREE.CylinderGeometry(0.25,0.25,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);

red.position.y = 0.5;
white.position.y = -0.5;

group.add(red);
group.add(white);

scene.add(group);

// вода
const water = new THREE.Mesh(
  new THREE.PlaneGeometry(10,4),
  new THREE.MeshStandardMaterial({
    color:0x0b7a75,
    transparent:true,
    opacity:0.4
  })
);

water.rotation.x = -Math.PI/2;
water.position.y = -1;

scene.add(water);

function animate() {
  requestAnimationFrame(animate);

  const t = Date.now()*0.002;

  group.position.y = Math.sin(t)*0.2;
  group.rotation.y += 0.01;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
