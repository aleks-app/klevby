<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Klevby</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1f1a;
  color:white;
}

.container {
  max-width:600px;
  margin:auto;
  padding:20px;
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.post {
  background:#122e28;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>Klevby 🎣</h2>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="signUp()">Регистрация</button>
  <button onclick="signIn()">Вход</button>
</div>

<hr>

<h3>Добавить объявление</h3>

<input id="name" placeholder="Имя">
<input id="city" placeholder="Город">
<textarea id="text" placeholder="Описание"></textarea>
<input id="telegram" placeholder="Telegram без @">

<button onclick="addPost()">Добавить</button>

<hr>

<h3>Объявления</h3>

<div id="posts"></div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://oecdshvozssadzctcokog.supabase.co",
  "sb_publishable_lyYIaXcnAG21RaNJuVYRgA_yuRjselS"
);

async function signUp() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signUp({ email, password });

  if(error) alert(error.message);
  else alert("Регистрация ок, проверь почту");
}

async function signIn() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error) alert(error.message);
  else {
    alert("Вошёл");
    loadPosts();
  }
}

async function addPost() {
  const { data: user } = await supabase.auth.getUser();

  if(!user.user) {
    alert("Сначала войди");
    return;
  }

  const post = {
    name: document.getElementById('name').value,
    city: document.getElementById('city').value,
    text: document.getElementById('text').value,
    telegram: document.getElementById('telegram').value,
    owner_id: user.user.id
  };

  const { error } = await supabase.from('posts').insert([post]);

  if(error) alert(error.message);
  else {
    alert("Добавлено");
    loadPosts();
  }
}

function formatDate(date) {
  return new Date(date).toLocaleString('ru-RU', {
    day:'numeric',
    month:'short',
    hour:'2-digit',
    minute:'2-digit'
  });
}

async function loadPosts() {
  const { data } = await supabase
    .from('posts')
    .select('*')
    .order('created_at', { ascending:false });

  const container = document.getElementById('posts');
  container.innerHTML = '';

  data.forEach(post => {
    const div = document.createElement('div');
    div.className = 'post';

    div.innerHTML = `
      <b>${post.name} — ${post.city}</b><br>
      ${post.text}<br>
      📩 @${post.telegram}<br>
      🕒 ${formatDate(post.created_at)}
    `;

    container.appendChild(div);
  });
}

loadPosts();

</script>

</body>
</html>
