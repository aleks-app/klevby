<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klevby — Рыбалка</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #07130f;
  color: white;
}

.header {
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.hero {
  padding: 60px 20px;
}

h1 {
  font-size: 42px;
}

button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: #1ed760;
  cursor: pointer;
  margin-top: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

#posts {
  padding: 20px;
}

.card {
  background: #1c2b26;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="header">🎣 Klevby</div>

<div class="hero">
  <h1>Найди компанию на рыбалку</h1>

  <input id="name" placeholder="Имя">
  <input id="city" placeholder="Город">
  <textarea id="text" placeholder="Описание"></textarea>

  <button onclick="addPost()">Создать объявление</button>
</div>

<div id="posts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = 'https://oecdshvozssadztcokog.supabase.co'
const supabaseKey = 'sb_publishable_lyYIaXcnAG21RaNJuVYRgA_yuRjselS'

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

// загрузка объявлений
async function loadPosts() {
  const { data, error } = await supabase
    .from('posts')
    .select('*')
    .order('created_at', { ascending: false })

  if (error) {
    console.error(error)
    return
  }

  const container = document.getElementById('posts')
  container.innerHTML = ''

  data.forEach(post => {
    const card = document.createElement('div')
    card.className = 'card'

    card.innerHTML = `
      <h3>${post.name} — ${post.city}</h3>
      <p>${post.text}</p>
    `

    container.appendChild(card)
  })
}

// добавление объявления
async function addPost() {
  const name = document.getElementById('name').value
  const city = document.getElementById('city').value
  const text = document.getElementById('text').value

  const { error } = await supabase
    .from('posts')
    .insert([{ name, city, text }])

  if (error) {
    alert('Ошибка добавления')
  } else {
    document.getElementById('name').value = ''
    document.getElementById('city').value = ''
    document.getElementById('text').value = ''
    loadPosts()
  }
}

// запуск
loadPosts()
</script>

</body>
</html>
