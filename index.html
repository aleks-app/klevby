<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klevby — рыбалка в Беларуси</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #06130f;
    color: white;
}

header {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

.hero {
    position: relative;
    height: 400px;
}

#bg3d {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
}

.hero-content {
    position: relative;
    z-index: 2;
    padding: 40px;
}

.btn {
    background: #2ecc71;
    padding: 12px 20px;
    border-radius: 10px;
    display: inline-block;
    margin-top: 20px;
    cursor: pointer;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #0f2a24;
    padding: 20px;
    border-radius: 15px;
}

input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2ecc71;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🎣 Klevby</header>

<div class="hero">
    <div id="bg3d"></div>

    <div class="hero-content">
        <h1>Найди компанию на рыбалку</h1>
        <div class="btn" onclick="scrollToAds()">Смотреть объявления</div>
    </div>
</div>

<div style="padding:20px">
    <h2>Добавить объявление</h2>
    <input id="name" placeholder="Имя">
    <input id="city" placeholder="Город">
    <textarea id="text" placeholder="Описание"></textarea>
    <button onclick="addAd()">Добавить</button>
</div>

<div id="ads" class="cards"></div>

<script>
const supabase = window.supabase.createClient(
    "https://oecdshvozssadzctokog.supabase.co",
    "sb_publishable_lyYIaXcnAG21RaNJuVYRgA_yuRjselS"
);

async function loadAds() {
    const { data } = await supabase.from('ads').select('*').order('id', {ascending:false});
    const adsDiv = document.getElementById('ads');
    adsDiv.innerHTML = '';

    data.forEach(ad => {
        adsDiv.innerHTML += `
        <div class="card">
            <h3>${ad.name} — ${ad.city}</h3>
            <p>${ad.text}</p>
        </div>`;
    });
}

async function addAd() {
    const name = document.getElementById('name').value;
    const city = document.getElementById('city').value;
    const text = document.getElementById('text').value;

    await supabase.from('ads').insert([{name, city, text}]);
    loadAds();
}

function scrollToAds() {
    document.getElementById('ads').scrollIntoView({behavior:'smooth'});
}

loadAds();
</script>

<script>
// THREE JS
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / 400, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(window.innerWidth, 400);
document.getElementById('bg3d').appendChild(renderer.domElement);

const geometry = new THREE.CylinderGeometry(0.1,0.1,2,32);
const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
const float = new THREE.Mesh(geometry, material);
scene.add(float);

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    float.rotation.y += 0.01;
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
