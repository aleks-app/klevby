<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klevby — рыбалка в Беларуси</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #06130f;
      color: white;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: 94%;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 19, 15, 0.9);
      backdrop-filter: blur(15px);
      padding: 15px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.05);
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .nav-btn:hover, .nav-btn.active {
      background: #2da8ef;
      transform: translateY(-2px);
    }

    .hero {
      margin: 30px 0;
      border-radius: 40px;
      overflow: hidden;
      min-height: 500px;
      background: 
        linear-gradient(90deg, rgba(0,0,0,0.8), rgba(0,0,0,0.2)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80") center/cover;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero h1 { font-size: clamp(32px, 5vw, 60px); margin: 0 0 20px; line-height: 1.1; }
    .hero p { font-size: clamp(18px, 2vw, 24px); max-width: 600px; color: #ccc; margin-bottom: 30px; }

    .main-btn {
      border: none;
      border-radius: 18px;
      padding: 18px 30px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      display: inline-block;
      text-align: center;
    }

    .green { background: #25d366; color: #000; }
    .blue { background: #2da8ef; color: #fff; }
    .red { background: #f04b4b; color: #fff; }
    .yellow { background: #ffd84d; color: #000; }
    .gray { background: rgba(255,255,255,0.15); color: #fff; }
    .disabled { background: #444 !important; color: #888 !important; cursor: not-allowed; }

    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 30px;
      margin-bottom: 30px;
    }

    input, textarea {
      width: 100%;
      border-radius: 15px;
      padding: 15px;
      margin: 8px 0;
      border: none;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
      margin-bottom: 50px;
    }

    .card {
      background: #15221d;
      border-radius: 25px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .card:hover { transform: translateY(-5px); border-color: #2da8ef; }
    .card.full { opacity: 0.5; filter: grayscale(0.8); }

    .card-img { height: 180px; background-size: cover; background-position: center; }
    .card-body { padding: 20px; }
    
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
    .tag { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
    .tag.owner { background: rgba(45, 168, 239, 0.2); color: #2da8ef; }

    /* Skeleton Loading */
    .skeleton {
      height: 350px;
      background: linear-gradient(90deg, #15221d 25%, #1c2e27 50%, #15221d 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 25px;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 768px) {
      .hero { padding: 30px; min-height: 400px; border-radius: 0; }
      nav { display: grid; grid-template-columns: 1fr 1fr; width: 100%; }
      .nav-btn { font-size: 14px; padding: 12px 5px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap header-inner">
      <div class="logo">🎣 Klevby</div>
      <nav>
        <button class="nav-btn" onclick="showSection('home')">Напарники</button>
        <button class="nav-btn" onclick="showSection('ponds')">Платники</button>
        <button class="nav-btn" onclick="setMode('mine')">Мои посты</button>
        <button class="nav-btn" onclick="showSection('auth')">Профиль</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section id="homeSection">
      <div class="hero">
        <h1>Найди компанию на рыбалку</h1>
        <p>Белорусское сообщество рыбаков. Объявления, выезды и свежие отчеты.</p>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button class="main-btn green" onclick="scrollToPosts()">Смотреть ленту</button>
          <button class="main-btn gray" onclick="window.open('https://t.me/+W6eAuefzcJwwODEy')">Наш Telegram</button>
        </div>
      </div>

      <div class="panel" id="createPanel">
        <h2 id="formTitle">➕ Новое объявление</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
          <input id="nameInput" placeholder="Твоё имя">
          <input id="cityInput" placeholder="Город">
        </div>
        <textarea id="textInput" placeholder="Куда едешь, когда, есть ли места в авто?"></textarea>
        <input id="telegramInput" placeholder="Telegram (ник или ссылка)">
        <div style="margin-top: 15px; display: flex; gap: 10px;">
          <button class="main-btn blue" onclick="savePost()">Опубликовать</button>
          <button id="cancelEditBtn" class="main-btn gray hidden" onclick="cancelEdit()">Отмена</button>
        </div>
      </div>

      <div id="statusLine" style="margin-bottom: 20px; font-weight: bold; color: #2da8ef;"></div>

      <div id="postsSection" class="grid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </section>

    <section id="pondsSection" class="hidden">
      <div class="panel"><h2>💧 Платные водоемы</h2><p>Раздел в разработке...</p></div>
    </section>

    <section id="authSection" class="hidden">
      <div class="panel">
        <h2>🔐 Вход / Регистрация</h2>
        <input id="emailInput" type="email" placeholder="Email">
        <input id="passwordInput" type="password" placeholder="Пароль">
        <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
          <button class="main-btn blue" onclick="login()">Войти</button>
          <button class="main-btn gray" onclick="register()">Регистрация</button>
          <button class="main-btn red" onclick="logout()">Выйти</button>
        </div>
        <div id="authStatus" style="margin-top: 20px;"></div>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://oecdshvozssadztcokog.supabase.co";
    const SUPABASE_KEY = "sb_publishable_lyYIaXcnAG21RaNJuVYRgA_yuRjselS";
    const ADMIN_EMAIL = "al822alex@gmail.com";
    
    const IMAGES = [
      "https://images.unsplash.com/photo-1511884642898-4c92249e20b6?q=80&w=600",
      "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=600",
      "https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=600"
    ];

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let posts = [];
    let user = null;
    let viewMode = 'all';
    let editId = null;

    async function init() {
      const { data } = await supabase.auth.getUser();
      user = data?.user || null;
      
      // Автозаполнение из памяти
      document.getElementById('nameInput').value = localStorage.getItem('kb_name') || '';
      document.getElementById('telegramInput').value = localStorage.getItem('kb_tg') || '';
      
      updateUI();
      loadPosts();
    }

    function updateUI() {
      const status = document.getElementById('authStatus');
      if (user) {
        status.innerHTML = `✅ Вы вошли как: <b>${user.email}</b> ${user.email === ADMIN_EMAIL ? '<span style="color:#ffd84d"> (Админ)</span>' : ''}`;
      } else {
        status.innerHTML = "❌ Вы не авторизованы. Войдите, чтобы управлять своими постами.";
      }
    }

    async function loadPosts() {
      document.getElementById('statusLine').innerText = "Обновляем садок с рыбой...";
      const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
      if (!error) {
        posts = data;
        render();
      }
    }

    function render() {
      const container = document.getElementById('postsSection');
      let filtered = posts;
      
      if (viewMode === 'mine') {
        filtered = posts.filter(p => user && p.owner_id === user.id);
        document.getElementById('statusLine').innerText = "Показываем только ваши посты";
      } else {
        document.getElementById('statusLine').innerText = "Все свежие объявления";
      }

      container.innerHTML = filtered.map(p => {
        const isOwner = user && p.owner_id === user.id;
        const isAdm = user && user.email === ADMIN_EMAIL;
        const canEdit = isOwner || isAdm;
        const tg = cleanTg(p.telegram);
        const randImg = IMAGES[Math.abs(p.id.charCodeAt(0)) % IMAGES.length];

        return `
          <div class="card ${p.crew_full ? 'full' : ''}">
            <div class="card-img" style="background-image: url('${randImg}')"></div>
            <div class="card-body">
              <h3>${escape(p.name)} • ${escape(p.city)}</h3>
              <p>${escape(p.text)}</p>
              <div class="tags">
                <span class="tag">🕒 ${new Date(p.created_at).toLocaleDateString()}</span>
                ${p.crew_full ? '<span class="tag" style="background:#f04b4b">Экипаж полон</span>' : ''}
                ${isOwner ? '<span class="tag owner">Ваше</span>' : ''}
              </div>
              <div class="actions">
                ${p.crew_full ? '' : `<button class="main-btn green" style="padding:10px 15px; font-size:14px" onclick="window.open('https://t.me/${tg}')">Связаться</button>`}
                ${canEdit ? `
                  <button class="main-btn yellow" style="padding:10px 15px; font-size:14px" onclick="editPost('${p.id}')">⚙️</button>
                  <button class="main-btn red" style="padding:10px 15px; font-size:14px" onclick="deletePost('${p.id}')">🗑️</button>
                  <button class="main-btn gray" style="padding:10px 15px; font-size:14px" onclick="toggleFull('${p.id}', ${!p.crew_full})">👥</button>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function savePost() {
      if (!user) return alert("Войдите на сайт, чтобы опубликовать пост!");
      
      const name = document.getElementById('nameInput').value;
      const tgRaw = document.getElementById('telegramInput').value;
      const city = document.getElementById('cityInput').value;
      const text = document.getElementById('textInput').value;

      if (!name || !city || !text) return alert("Заполни все поля!");

      // Сохраняем в память браузера
      localStorage.setItem('kb_name', name);
      localStorage.setItem('kb_tg', tgRaw);

      const payload = { name, city, text, telegram: tgRaw, owner_id: user.id };

      if (editId) {
        await supabase.from('posts').update(payload).eq('id', editId);
      } else {
        await supabase.from('posts').insert([payload]);
      }

      cancelEdit();
      loadPosts();
    }

    async function deletePost(id) {
      if (confirm("Точно удалить? Рыба сорвется!")) {
        await supabase.from('posts').delete().eq('id', id);
        loadPosts();
      }
    }

    async function toggleFull(id, val) {
      await supabase.from('posts').update({ crew_full: val }).eq('id', id);
      loadPosts();
    }

    function editPost(id) {
      const p = posts.find(x => x.id === id);
      editId = id;
      document.getElementById('nameInput').value = p.name;
      document.getElementById('cityInput').value = p.city;
      document.getElementById('textInput').value = p.text;
      document.getElementById('telegramInput').value = p.telegram;
      document.getElementById('formTitle').innerText = "✏️ Редактируем";
      document.getElementById('cancelEditBtn').classList.remove('hidden');
      document.getElementById('createPanel').scrollIntoView();
    }

    function cancelEdit() {
      editId = null;
      document.getElementById('formTitle').innerText = "➕ Новое объявление";
      document.getElementById('cancelEditBtn').classList.add('hidden');
      document.getElementById('textInput').value = "";
    }

    function cleanTg(v) {
      return v.replace('@', '').replace('https://t.me/', '').split('?')[0].trim();
    }

    function escape(t) {
      let d = document.createElement('div');
      d.innerText = t;
      return d.innerHTML;
    }

    // Auth Functions
    async function login() {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) alert(error.message); else location.reload();
    }

    async function register() {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) alert(error.message); else alert("Проверь почту для подтверждения!");
    }

    async function logout() {
      await supabase.auth.signOut();
      location.reload();
    }

    function showSection(s) {
      ['home','ponds','auth'].forEach(x => document.getElementById(x+'Section').classList.add('hidden'));
      document.getElementById(s+'Section').classList.remove('hidden');
    }

    function setMode(m) { viewMode = m; render(); }
    function scrollToPosts() { document.getElementById('postsSection').scrollIntoView(); }

    init();
  </script>
</body>
</html>
