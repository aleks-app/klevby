<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klevby — Рыбалка</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #07130f;
  color: white;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: black;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.card {
  background: #0f1f1a;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

a {
  color: #22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>🎣 Klevby</h1>

<input id="name" placeholder="Имя">
<input id="city" placeholder="Город">
<textarea id="text" placeholder="Описание"></textarea>
<input id="telegram" placeholder="Telegram username (без @)">

<button onclick="addPost()">Создать объявление</button>

<div id="posts"></div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://oecdshvozssadztcokog.supabase.co",
  "sb_publishable_lyYIaXcnAG21RaNJuVYRgA_yuRjselS"
)

async function loadPosts() {
  const { data } = await supabase.from('posts').select('*').order('id', { ascending: false })

  const container = document.getElementById('posts')
  container.innerHTML = ''

  data.forEach(post => {
    const div = document.createElement('div')
    div.className = 'card'

    div.innerHTML = `
      <b>${post.name} — ${post.city}</b>
      <p>${post.text}</p>
      <a href="https://t.me/${post.telegram}" target="_blank">
        👉 Написать в Telegram
      </a>
    `

    container.appendChild(div)
  })
}

async function addPost() {
  const name = document.getElementById('name').value
  const city = document.getElementById('city').value
  const text = document.getElementById('text').value
  const telegram = document.getElementById('telegram').value

  await supabase.from('posts').insert([
    { name, city, text, telegram }
  ])

  loadPosts()
}

loadPosts()
</script>

</body>
</html>
