<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klevby — Рыбалка</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b1d16;
  color:white;
}

a {text-decoration:none;color:inherit}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo {font-size:24px;font-weight:bold}

.nav a {
  margin-left:10px;
  padding:10px 15px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
}

/* HERO */
.hero {
  padding:60px 40px;
  background:
  linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
  url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');
  background-size:cover;
}

.btn {
  padding:10px 15px;
  border-radius:10px;
  margin-top:10px;
  display:inline-block;
}

.btn-main {background:#2cc56e;color:black}
.btn-second {background:rgba(255,255,255,0.2)}

/* GRID */
.section {padding:40px}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#132a21;
  border-radius:12px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content {padding:15px}

.tags span {
  background:#1c7c54;
  padding:5px 10px;
  border-radius:10px;
  margin:5px;
  display:inline-block;
}

/* MODAL */
#formModal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.form {
  background:#0b1d16;
  padding:20px;
  border-radius:15px;
  width:300px;
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:10px;
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">🎣 Klevby</div>
  <div class="nav">
    <a href="#partners">Напарники</a>
    <a href="#">Трофеи</a>
    <a href="https://t.me/+W6eAuefzcJwwODEy" target="_blank">Telegram</a>
  </div>
</div>

<div class="hero">
  <h1>Найди компанию на рыбалку</h1>

  <a href="https://t.me/+W6eAuefzcJwwODEy" target="_blank" class="btn btn-main">
    Войти в чат
  </a>

  <a href="#" onclick="openForm()" class="btn btn-second">
    ➕ Создать объявление
  </a>
</div>

<div class="section" id="partners">
  <h2>Объявления</h2>

  <div class="grid">

    <!-- 1 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1511593358241-7eea1f3c84e5">
      <div class="card-content">
        <h3>Минск</h3>
        <p>Еду завтра, ищу напарника</p>
      </div>
    </div>

    <!-- 2 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
      <div class="card-content">
        <h3>Гомель</h3>
        <p>Новичок, ищу наставника</p>
      </div>
    </div>

    <!-- 3 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
      <div class="card-content">
        <h3>Брест</h3>
        <p>Карп на сутки</p>
      </div>
    </div>

    <!-- ещё карточки можешь сам копировать -->

  </div>
</div>

<!-- MODAL -->
<div id="formModal">
  <div class="form">
    <h3>Создать объявление</h3>

    <input id="name" placeholder="Имя">
    <input id="city" placeholder="Город">
    <textarea id="text" placeholder="Описание"></textarea>

    <button onclick="addPost()">Добавить</button>
    <button onclick="closeForm()">Закрыть</button>
  </div>
</div>

<script>
function openForm() {
  document.getElementById("formModal").style.display = "flex";
}

function closeForm() {
  document.getElementById("formModal").style.display = "none";
}

function addPost() {
  let name = document.getElementById("name").value;
  let city = document.getElementById("city").value;
  let text = document.getElementById("text").value;

  let html = `
  <div class="card">
    <div class="card-content">
      <h3>${name} — ${city}</h3>
      <p>${text}</p>
    </div>
  </div>
  `;

  document.querySelector(".grid").innerHTML =
    html + document.querySelector(".grid").innerHTML;

  closeForm();
}
</script>

</body>
</html>
